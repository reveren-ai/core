name: Release

# Changesets-driven release. MANUAL while the launch is pre-publish — run it
# from the Actions tab when you intend to cut a release:
#   - pending changesets        → opens/refreshes a "Version Packages" PR
#   - version PR merged (none)   → publishes to npm
# Publishing is gated twice: the version PR must be merged AND the NPM_TOKEN
# secret must be present. To go live, also enable "Allow GitHub Actions to
# create and approve pull requests" (repo → Settings → Actions → General) and,
# if you want it automatic, restore the `push: branches: [main]` trigger.
# See RELEASING.md.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: release-${{ github.ref }}

# Husky installs git hooks on `pnpm install`; they must not fire on the bot's
# release commit (the usual cause of "/usr/bin/git failed with exit code 1").
env:
  HUSKY: 0

jobs:
  release:
    name: version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
